# nginx/nginx.conf
# Reverse proxy: routes /api/* to the Node backend, everything else to static frontend.

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Hide server version ─────────────────────────────────
    server_tokens off;

    # ── Rate limiting zones ─────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;
    limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;

    # ── Gzip compression ────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    upstream backend {
        server backend:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"           always;
        add_header X-Content-Type-Options    "nosniff"              always;
        add_header X-XSS-Protection          "1; mode=block"        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── API proxy ───────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       "upgrade";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;

            # Don't leak backend errors to clients
            proxy_intercept_errors on;
            error_page 502 503 504 /50x.json;
        }

        # Stricter rate limit for login
        location /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        }

        # ── Static frontend ─────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|mp4)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── Custom error responses ───────────────────────────
        location = /50x.json {
            internal;
            default_type application/json;
            return 503 '{"message":"Service temporarily unavailable"}';
        }
    }
}
