version: "3.9"

# ── Secrets are injected via .env — never hardcode values here ──────────────
# Copy backend/.env.example → backend/.env and fill in your values before running.

services:

  # ── Node.js backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zilist-backend
    restart: unless-stopped
    env_file: ./backend/.env          # ← all secrets live here, not in this file
    environment:
      NODE_ENV: production
    expose:
      - "5000"
    volumes:
      - backend_logs:/app/src/logs
    networks:
      - zilist-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: zilist-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/src/pages:/usr/share/nginx/html:ro
      - ./frontend/public:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - zilist-net

  # ── Redis (optional — uncomment to enable distributed rate limiting) ──────
  # redis:
  #   image: redis:7-alpine
  #   container_name: zilist-redis
  #   restart: unless-stopped
  #   expose:
  #     - "6379"
  #   networks:
  #     - zilist-net

networks:
  zilist-net:
    driver: bridge

volumes:
  backend_logs:
