<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonials | ZILIST Admin</title>
  <meta name="description" content="Manage ZILIST testimonials privately.">
  <meta name="robots" content="noindex,nofollow">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="stylesheet" href="assets/css/admin-testimonials.css">
</head>
<body data-page="admin-testimonials" data-admin="testimonials">
  <div data-navbar></div>
  <main class="admin-shell">
    <div data-admin-sidebar></div>
    <section class="admin-content">
      <div class="admin-topbar"><div><p class="eyebrow">Testimonials</p><h1 class="admin-title">Client proof.</h1></div></div>
      <div class="admin-grid testimonial-grid">
        <form class="admin-card form-stack" data-testimonial-form>
          <input class="form-field" name="name" placeholder="Client name" required>
          <input class="form-field" name="role" placeholder="Role / company">
          <textarea class="form-field" name="quote" placeholder="Testimonial quote" required></textarea>
          <button class="btn btn-primary" type="submit">Publish Testimonial</button>
        </form>
        <article class="admin-card">
          <table class="admin-table"><thead><tr><th>Name</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody data-admin-testimonials></tbody></table>
        </article>
      </div>
    </section>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/admin.js"></script>
  <script src="assets/js/admin-testimonials.js"></script>
</body>
</html>
