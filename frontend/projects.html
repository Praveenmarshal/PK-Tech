<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | ZILIST AI</title>
  <meta name="description" content="Explore ZILIST AI projects including chatbot platforms, analytics dashboards, automation platforms, cybersecurity dashboards, and portfolio systems.">
  <meta name="keywords" content="ZILIST Projects, AI Chatbot Platform, Analytics Dashboard, AI Automation Platform, Cybersecurity Dashboard">
  <link rel="preload" href="assets/videos/pages-bg.mp4" as="video" type="video/mp4">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/projects.css">
</head>
<body data-page="projects">
  <!-- Pages video background -->
  <div class="pages-video-bg" aria-hidden="true">
    <video id="pages-bg-video" autoplay muted loop playsinline preload="auto">
      <source src="assets/videos/pages-bg.mp4" type="video/mp4">
    </video>
  </div>
  <script>
    (function () {
      var v = document.getElementById('pages-bg-video');
      if (!v) return;
      v.load();
      var played = false;
      function tryPlay() { if (played) return; played = true; v.play().catch(function(){}); }
      v.addEventListener('canplay', tryPlay);
      v.addEventListener('loadeddata', tryPlay);
      tryPlay();
    })();
  </script>
  <div data-navbar></div>
  <main class="page-shell">
    <section class="page-hero compact projects-hero">
      <div>
        <p class="eyebrow">Projects</p>
        <h1 class="page-title">Our latest projects.</h1>
        <p class="hero-copy">A cinematic showcase of AI solutions, dashboards, automation systems, and premium full-stack applications.</p>
      </div>
    </section>
    <section class="section">
      <div class="projects-toolbar">
        <div class="filter-row">
          <button class="filter-pill is-active" data-project-filter="All">All</button>
          <button class="filter-pill" data-project-filter="AI Solution">AI</button>
          <button class="filter-pill" data-project-filter="Web Development">Web Development</button>
          <button class="filter-pill" data-project-filter="Dashboard">Dashboards</button>
          <button class="filter-pill" data-project-filter="Automation">Automation</button>
          <button class="filter-pill" data-project-filter="Security">Security</button>
        </div>
        <a class="btn btn-primary" href="contact.html">Start a Project</a>
      </div>
      <div class="project-grid" data-project-grid></div>
    </section>
  </main>
  <div data-footer></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/projects.js"></script>
</body>
</html>
