<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resource Details | PK Tech</title>
  <meta name="description" content="PK Tech resource details with article sections, related articles, and AI automation insights.">
  <!-- Video preloaded by JS on desktop only -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/resource-details.css">
  <script src="../assets/js/video-autoplay.js" defer></script>
</head>
<body data-page="resources">
  <script src="../assets/js/pk-loader.js"></script>

  <!-- Pages video background -->
  <!-- Pages video background -->
  <div class="pages-video-bg" aria-hidden="true">
    <video id="pages-bg-video" autoplay muted loop playsinline preload="auto" poster="https://res.cloudinary.com/dtcws61gi/video/upload/so_0/pages-bg_udgphy.jpg" webkit-playsinline x5-playsinline>
      <source src="https://res.cloudinary.com/dtcws61gi/video/upload/q_60/v1781504944/pages-bg_udgphy.mp4" type="video/mp4">
    </video>
  </div>
  <script>
    (function () {
      var v = document.getElementById('pages-bg-video');
      if (!v) return;
      v.muted = true;
      v.load();
      function tryPlay() { v.play().catch(function(){}); }
      v.addEventListener('canplay', tryPlay);
      v.addEventListener('loadedmetadata', tryPlay);
      tryPlay();
      document.addEventListener('touchstart', tryPlay, { once: true });
      document.addEventListener('touchend', tryPlay, { once: true });
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) tryPlay();
      });
    })();
  </script>

  <div data-navbar></div>

  <main class="page-shell">

    <!-- Hero -->
    <section class="page-hero compact article-hero">
      <div>
        <div class="meta-row">
          <a href="resources.html">Resources</a>
          <span>›</span>
          <span data-resource-breadcrumb>Resource</span>
        </div>
        <p class="eyebrow" data-resource-eyebrow>AI Automation</p>
        <h1 class="page-title" data-resource-title>The Future of AI Automation</h1>
        <p class="hero-copy" data-resource-hero>AI automation is transforming business operations from repetitive workflows to intelligent decision-making.</p>
      </div>
    </section>

    <!-- Hero Image -->
    <section class="section resource-hero-img-wrap">
      <img
        class="resource-hero-img"
        data-resource-image
        src="https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=1200&q=80"
        alt="Resource cover"
        loading="eager"
      >
    </section>

    <!-- Article + Sidebar -->
    <section class="section article-layout">

      <article class="glass-panel article-body">
        <div data-resource-body>
          <!-- Filled by JS -->
        </div>
      </article>

      <aside class="glass-panel toc">
        <h2 class="card-title">Table of Contents</h2>
        <ol class="body-copy" data-resource-toc>
          <!-- Filled by JS -->
        </ol>

        <h2 class="card-title" style="margin-top:1.5rem">Related Articles</h2>
        <div class="footer-links related-links" data-resource-related>
          <!-- Filled by JS -->
        </div>
      </aside>

    </section>

  </main>

  <div data-footer></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/resource-details.js"></script>
  <script src="assets/js/scroll-animations.js"></script>
</body>
</html>
