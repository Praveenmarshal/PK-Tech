<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | PK Tech</title>
  <meta name="description" content="Private owner-only PK Tech admin login for Praveen Kannan.">
  <meta name="robots" content="noindex,nofollow">
  <!-- Video preloaded by JS on desktop only -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/admin-login.css">
</head>
<body data-page="admin-login" data-admin="login">
  <script src="../assets/js/pk-loader.js"></script>

  <!-- Admin video background -->
  <div class="admin-video-bg" aria-hidden="true">
    <video id="admin-bg-video" autoplay muted loop playsinline preload="auto">
      <source src="https://res.cloudinary.com/dtcws61gi/video/upload/v1781504938/admin-bg_m5oitd.mp4" type="video/mp4">
    </video>
  </div>
  <script>
    (function () {
      // Skip video on mobile — too heavy, uses static image instead
      if (window.innerWidth <= 768 || !window.matchMedia('(hover: hover)').matches) return;
      var v = document.getElementById('admin-bg-video');
      if (!v) return;
      v.load();
      var played = false;
      function tryPlay() { if (played) return; played = true; v.play().catch(function(){}); }
      v.addEventListener('canplay', tryPlay);
      v.addEventListener('loadeddata', tryPlay);
      tryPlay();
    })();
  </script>
  <div data-navbar></div>
  <main class="login-page">
    <section class="login-card glass-panel">
      <p class="eyebrow">Private Admin</p>
      <h1 class="page-title">Owner login.</h1>
      <p class="body-copy">Secure access for managing PK Tech projects, resources, messages, analytics, payment proofs, testimonials, settings, and the AI assistant.</p>
      <form class="form-stack" data-admin-login>
        <input class="form-field" type="email" name="email" placeholder="Admin Email" required>
        <input class="form-field" type="password" name="password" placeholder="Admin Password" required>
        <button class="btn btn-primary" type="submit">Login</button>
        <p class="form-status" data-login-status></p>
      </form>
    </section>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/admin-login.js"></script>
  <script src="assets/js/scroll-animations.js"></script>
</body>
</html>
