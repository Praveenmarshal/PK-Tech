<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Video preloaded by JS on desktop only -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/project-details.css">

<body data-page="projects">
  <script src="../assets/js/pk-loader.js"></script>

  <!-- Pages video background -->
  <!-- Pages video background -->
  <div class="pages-video-bg" aria-hidden="true">
    <video id="pages-bg-video" autoplay muted loop playsinline preload="auto" poster="https://res.cloudinary.com/dtcws61gi/video/upload/so_0/pages-bg_udgphy.jpg" webkit-playsinline x5-playsinline>
      <source src="https://res.cloudinary.com/dtcws61gi/video/upload/f_auto,q_auto/v1781504944/pages-bg_udgphy.mp4" type="video/mp4">
    </video>
  </div>
  <script>
    (function () {
      var v = document.getElementById('pages-bg-video');
      if (!v) return;
      v.muted = true;
      v.load();
      function tryPlay() { v.play().catch(function(){}); }
      v.addEventListener('canplay', tryPlay);
      v.addEventListener('loadedmetadata', tryPlay);
      tryPlay();
      document.addEventListener('touchstart', tryPlay, { once: true });
      document.addEventListener('touchend', tryPlay, { once: true });
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) tryPlay();
      });
    })();
  </script>
  <div data-navbar></div>
  <main class="page-shell">
    <section class="page-hero project-detail-hero">
      <div>
        <div class="meta-row"><a href="projects.html">Projects</a><span>›</span><span data-project-category>AI Solution</span></div>

        <h1 class="page-title" data-project-title>AI Chatbot Platform</h1>
        <p class="hero-copy" data-project-summary></p>
        <div class="button-row">
          <a class="btn btn-primary" href="contact.html">Start Similar Project</a>
          <a class="btn btn-secondary" href="portfolio.html">View Portfolio</a>
        </div>
      </div>
      <div class="hero-media">
        <img class="project-hero-img" data-project-image
          src="https://images.unsplash.com/photo-1677442135703-1787eea5ce01?w=900&q=80"
          alt="Project preview" loading="eager">
      </div>
    </section>
    <section class="section">
      <div class="project-screen-row">

    <section class="section detail-grid" style="grid-template-columns: repeat(2, minmax(0, 1fr));">
