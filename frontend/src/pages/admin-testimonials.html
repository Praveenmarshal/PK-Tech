<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonials | PK Tech Admin</title>
  <meta name="description" content="Manage PK Tech testimonials privately.">
  <meta name="robots" content="noindex,nofollow">
  <!-- Video preloaded by JS on desktop only -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="stylesheet" href="assets/css/admin-testimonials.css">
</head>
<body data-page="admin-testimonials" data-admin="testimonials">
  <script src="../assets/js/pk-loader.js"></script>

  <!-- Admin video background -->
  <div class="admin-video-bg" aria-hidden="true">
    <video id="admin-bg-video" autoplay muted loop playsinline preload="auto" poster="https://res.cloudinary.com/dtcws61gi/video/upload/so_0/admin-bg_m5oitd.jpg">
      <source src="https://res.cloudinary.com/dtcws61gi/video/upload/v1781504938/admin-bg_m5oitd.mp4" type="video/mp4">
    </video>
  </div>
  <script>
    (function () {
      // Skip video on mobile — too heavy, uses static image instead
      if (window.innerWidth <= 768 || !window.matchMedia('(hover: hover)').matches) return;
      var v = document.getElementById('admin-bg-video');
      if (!v) return;
      v.load();
      var played = false;
      function tryPlay() { if (played) return; played = true; v.play().catch(function(){}); }
      v.addEventListener('canplay', tryPlay);
      v.addEventListener('loadeddata', tryPlay);
      tryPlay();
    })();
  </script>
  <div data-navbar></div>
  <main class="admin-shell">
    <div data-admin-sidebar></div>
    <section class="admin-content">
      <div class="admin-topbar"><div><p class="eyebrow">Testimonials</p><h1 class="admin-title">Client proof.</h1></div></div>
      <div class="admin-grid testimonial-grid">
        <form class="admin-card form-stack" data-testimonial-form>
          <input class="form-field" name="name" placeholder="Client name" required>
          <input class="form-field" name="role" placeholder="Role / company">
          <textarea class="form-field" name="quote" placeholder="Testimonial quote" required></textarea>
          <button class="btn btn-primary" type="submit">Publish Testimonial</button>
        </form>
        <article class="admin-card">
          <table class="admin-table"><thead><tr><th>Name</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody data-admin-testimonials></tbody></table>
        </article>
      </div>
    </section>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/admin.js"></script>
  <script src="assets/js/admin-testimonials.js"></script>
  <script src="assets/js/scroll-animations.js"></script>
</body>
</html>
