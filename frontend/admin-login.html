<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | ZILIST</title>
  <meta name="description" content="Private owner-only ZILIST admin login for Praveen Kannan.">
  <meta name="robots" content="noindex,nofollow">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/admin-login.css">
</head>
<body data-page="admin-login" data-admin="login">
  <div data-navbar></div>
  <main class="login-page">
    <section class="login-card glass-panel">
      <p class="eyebrow">Private Admin</p>
      <h1 class="page-title">Owner login.</h1>
      <p class="body-copy">Secure access for managing ZILIST projects, resources, messages, analytics, payment proofs, testimonials, settings, and the AI assistant.</p>
      <form class="form-stack" data-admin-login>
        <input class="form-field" type="email" name="email" placeholder="Admin Email" required>
        <input class="form-field" type="password" name="password" placeholder="Admin Password" required>
        <button class="btn btn-primary" type="submit">Login</button>
        <p class="form-status" data-login-status></p>
      </form>
    </section>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/admin-login.js"></script>
</body>
</html>
